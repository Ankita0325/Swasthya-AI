name: Auto Assign

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign and Label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = 'indresh404';
            
            if (context.payload.issue) {
              const issueNum = context.payload.issue.number;
              console.log(`Processing issue #${issueNum}`);
              
              // Auto-label based on keywords
              const title = context.payload.issue.title.toLowerCase();
              const body = (context.payload.issue.body || '').toLowerCase();
              const labels = [];
              if (title.includes('bug') || body.includes('bug')) labels.push('bug');
              if (title.includes('feature') || body.includes('feature') || title.includes('enhancement')) labels.push('enhancement');
              if (title.includes('docs') || body.includes('docs') || title.includes('document')) labels.push('docs');
              if (title.includes('database') || body.includes('database') || title.includes('sql') || title.includes('db')) labels.push('database');
              
              if (labels.length > 0) {
                console.log(`Adding labels to issue #${issueNum}: ${labels}`);
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                  labels: labels
                });
              }
            } else if (context.payload.pull_request) {
              const prNum = context.payload.pull_request.number;
              
              if (context.payload.action === 'opened') {
                console.log(`Processing opened PR #${prNum}`);
                
                // Request review from indresh404 only if indresh404 is NOT the PR author
                const prAuthor = context.payload.pull_request.user.login;
                if (prAuthor !== username) {
                  console.log(`Requesting review from ${username} for PR #${prNum}`);
                  try {
                    await github.rest.pulls.requestReviewers({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNum,
                      reviewers: [username]
                    });
                  } catch (err) {
                    console.error(`Failed to request review: ${err.message}`);
                  }
                } else {
                  console.log(`PR author is ${username}, skipping review request to self.`);
                }

                // Auto-label PR based on changed files
                try {
                  const files = await github.rest.pulls.listFiles({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNum
                  });
                  
                  const filenames = files.data.map(f => f.filename);
                  const labels = [];
                  
                  if (filenames.some(f => f.startsWith('app/'))) labels.push('frontend');
                  if (filenames.some(f => f.startsWith('backend/'))) labels.push('backend');
                  if (filenames.some(f => f.includes('db/') || f.includes('database') || f.includes('supabase') || f.includes('schema'))) labels.push('database');
                  if (filenames.some(f => f.startsWith('.github/') || f.includes('Dockerfile') || f.includes('docker-compose') || f.includes('eas.json'))) labels.push('devops');
                  if (filenames.some(f => f.endsWith('.md') || f.startsWith('docs/'))) labels.push('docs');

                  if (labels.length > 0) {
                    console.log(`Adding labels to PR #${prNum}: ${labels}`);
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNum,
                      labels: labels
                    });
                  }
                } catch (err) {
                  console.error(`Failed to auto-label PR: ${err.message}`);
                }
              } else if (context.payload.action === 'closed' && context.payload.pull_request.merged) {
                console.log(`PR #${prNum} merged! Scanning for associated issues to close automatically.`);
                
                const title = context.payload.pull_request.title || '';
                const body = context.payload.pull_request.body || '';
                const branchName = context.payload.pull_request.head.ref || '';
                
                const issueNumbers = new Set();
                
                // Pattern 1: #123
                const hashPattern = /#(\d+)/g;
                let match;
                while ((match = hashPattern.exec(title + ' ' + body)) !== null) {
                  issueNumbers.add(parseInt(match[1], 10));
                }
                
                // Pattern 2: issue-123 / fix-123
                const textPattern = /\b(?:issue|close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved|bug)[/-_-]?(\d+)\b/gi;
                while ((match = textPattern.exec(title + ' ' + body + ' ' + branchName)) !== null) {
                  issueNumbers.add(parseInt(match[1], 10));
                }
                
                if (issueNumbers.size > 0) {
                  console.log(`Found referenced issues: ${Array.from(issueNumbers).join(', ')}`);
                  for (const issueNum of issueNumbers) {
                    try {
                      console.log(`Closing issue #${issueNum} automatically...`);
                      await github.rest.issues.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issueNum,
                        state: 'closed',
                        state_reason: 'completed'
                      });
                      
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issueNum,
                        body: `Closed automatically because Pull Request #${prNum} was merged.`
                      });
                    } catch (err) {
                      console.error(`Failed to close issue #${issueNum}: ${err.message}`);
                    }
                  }
                } else {
                  console.log('No associated issues found to close.');
                }
              }
            }
